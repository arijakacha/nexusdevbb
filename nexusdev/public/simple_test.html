<!DOCTYPE html>
<html>
<head>
    <title>Simple Suggestions Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input { width: 300px; padding: 10px; font-size: 16px; }
        .suggestions { 
            border: 1px solid #ccc; 
            max-height: 200px; 
            overflow-y: auto; 
            position: absolute; 
            background: white; 
            z-index: 1000;
            display: none;
        }
        .suggestion-item { 
            padding: 10px; 
            cursor: pointer; 
            border-bottom: 1px solid #eee;
        }
        .suggestion-item:hover { background: #f0f0f0; }
        .test-container { position: relative; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Simple Suggestions Test</h1>
    
    <div class="test-container">
        <h3>Type "th" below:</h3>
        <input type="text" id="testInput" placeholder="Start typing...">
        <div id="suggestions" class="suggestions"></div>
    </div>
    
    <div id="log" style="background: #f5f5f5; padding: 10px; margin: 20px 0;">
        Log messages will appear here...
    </div>

    <script>
        const suggestions = ['the', 'that', 'their', 'them', 'this', 'there', 'these', 'those'];
        const input = document.getElementById('testInput');
        const suggestionsDiv = document.getElementById('suggestions');
        const log = document.getElementById('log');
        
        function logMessage(msg) {
            log.innerHTML += '<br>' + new Date().toLocaleTimeString() + ': ' + msg;
        }
        
        input.addEventListener('input', function() {
            const value = this.value;
            logMessage('Input: "' + value + '"');
            
            if (value.length < 2) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            const matches = suggestions.filter(s => s.startsWith(value.toLowerCase()));
            logMessage('Matches found: ' + matches.length);
            
            if (matches.length > 0) {
                suggestionsDiv.innerHTML = '';
                matches.forEach(match => {
                    const item = document.createElement('div');
                    item.className = 'suggestion-item';
                    item.textContent = match;
                    item.onclick = function() {
                        input.value = match;
                        suggestionsDiv.style.display = 'none';
                        logMessage('Selected: ' + match);
                    };
                    suggestionsDiv.appendChild(item);
                });
                suggestionsDiv.style.display = 'block';
                logMessage('Showing suggestions');
            } else {
                suggestionsDiv.style.display = 'none';
                logMessage('No matches - hiding suggestions');
            }
        });
        
        // Hide suggestions when clicking outside
        document.addEventListener('click', function(e) {
            if (!input.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                suggestionsDiv.style.display = 'none';
            }
        });
        
        logMessage('Simple suggestions test loaded');
    </script>
</body>
</html>
